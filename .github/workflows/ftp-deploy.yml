name: FTP Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          exclude: |
            admin/**
            admin
            cgi-bin/**
            logs/**
            .well-known/**
            **/.git*
            **/.git*/**
            **/.github/**
            **/.agent/**
            **/.vscode/**
            **/vendor/**
            **/node_modules/**
            **/.env*
            **/README.md
            **/database.sql
            **/Database/db.php
            **/scratch/**
            **/uploads/**
            **/static/**
            **/dist/**
          log-level: verbose
          dry-run: false
          dangerous-clean-slate: false
